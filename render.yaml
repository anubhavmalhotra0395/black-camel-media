# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: black-camel-media
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Set to your live URL (e.g. https://black-camel-media.onrender.com) so metadata and assets resolve correctly
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      # Optional: set in Dashboard if you use the Instagram grid (see .env.example)
      - key: INSTAGRAM_USER_ID
        sync: false
      - key: INSTAGRAM_ACCESS_TOKEN
        sync: false
